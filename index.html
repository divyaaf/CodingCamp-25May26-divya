<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Expense &amp; Budget Visualizer</h1>
      <button id="theme-toggle" aria-label="Switch to dark mode" title="Toggle dark/light mode">
        <span id="theme-icon">🌙</span>
      </button>
    </header>

    <main>
      <!-- Balance Display -->
      <div id="balance-display">
        <div id="balance-totals">
          <span id="balance-label">Total Expenses:</span>
          <span id="balance-amount">Rp 0</span>
        </div>
        <div id="budget-control">
          <label for="budget-limit">Monthly Budget Limit (Rp)</label>
          <input
            type="number"
            id="budget-limit"
            name="budget-limit"
            min="0"
            step="1000"
            placeholder="e.g. 500000"
            aria-describedby="budget-warning"
          />
        </div>
        <p id="budget-warning" role="alert" aria-live="polite"></p>
      </div>

      <!-- Expense Form -->
      <section aria-labelledby="form-heading">
        <h2 id="form-heading">Add Expense</h2>
        <form id="expense-form" novalidate>
          <div class="form-field">
            <label for="item-name">Item Name</label>
            <input
              type="text"
              id="item-name"
              name="item-name"
              maxlength="100"
              required
              autocomplete="off"
              placeholder="e.g. Lunch"
            />
            <span class="field-error" aria-live="polite"></span>
          </div>

          <div class="form-field">
            <label for="item-amount">Amount (Rp)</label>
            <input
              type="number"
              id="item-amount"
              name="item-amount"
              min="0.01"
              max="999999.99"
              step="0.01"
              required
              placeholder="e.g. 25000"
            />
            <span class="field-error" aria-live="polite"></span>
          </div>

          <div class="form-field">
            <label for="item-category">Category</label>
            <select id="item-category" name="item-category" required>
              <option value="">-- Select Category --</option>
            </select>
            <span class="field-error" aria-live="polite"></span>
            <div class="add-category-row">
              <input
                type="text"
                id="new-category-input"
                maxlength="30"
                autocomplete="off"
                placeholder="New category name"
                aria-label="New category name"
              />
              <button type="button" id="add-category-btn">+ Add</button>
            </div>
            <span id="category-error" class="field-error" aria-live="polite"></span>
          </div>

          <button type="submit" id="add-btn">Add Transaction</button>
        </form>
      </section>

      <!-- Transaction List -->
      <section aria-labelledby="list-heading">
        <div class="list-header">
          <h2 id="list-heading">Total Expenses</h2>
          <div class="sort-control">
            <label for="sort-select">Sort by</label>
            <select id="sort-select" aria-label="Sort transactions">
              <option value="default">Date Added</option>
              <option value="amount-desc">Amount: High → Low</option>
              <option value="amount-asc">Amount: Low → High</option>
              <option value="category">Category</option>
            </select>
          </div>
        </div>
        <div id="transaction-list-container">
          <ul id="transaction-list" aria-label="Expense list"></ul>
          <p id="empty-state">No expenses recorded yet.</p>
        </div>
      </section>

      <!-- Chart -->
      <section aria-labelledby="chart-heading">
        <h2 id="chart-heading">Expense Distribution</h2>
        <div id="chart-container">
          <canvas id="spending-chart" aria-label="Pie chart distribusi pengeluaran per kategori" role="img"></canvas>
          <p id="chart-empty-msg">No expense data available.</p>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"
      onerror="document.getElementById('chart-container').innerHTML='<p>Chart unavailable — please check your connection.</p>'"
    ></script>
    <script src="js/script.js" defer></script>
  </body>
</html>
